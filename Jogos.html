<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Game Hub - Jogos</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>

<header>
    <div class="logo">GAME <span>HUB</span></div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Jogos.html">Jogos</a></li>
          
        </ul>
    </nav>
</header>

<section class="top-bar">
    <input type="text" placeholder="Buscar jogo...">

    <select>
        <option>Todos</option>
        <option>Ação</option>
        <option>Corrida</option>
        <option>Esporte</option>
        <option>Aventura</option>
    </select>
</section>

<section class="games">

    <h2>🔥 Jogos Populares</h2>

    <div class="game-container">

        <div class="game-card">
            <img src="img/image copy 2.png">
            <div class="info">
                <h3>Cyber Race</h3>
                <p>Corrida futurista</p>
                <button>Jogar</button>
            </div>
        </div>

        <div class="game-card">
            <img src="img/image copy 3.png">
            <div class="info">
                <h3>War Zone</h3>
                <p>Ação intensa</p>
                <button>Jogar</button>
            </div>
        </div>

        <div class="game-card">
            <img src="img/image copy 4.png">
            <div class="info">
                <h3>Soccer Pro</h3>
                <p>Simulador de futebol</p>
                <button>Jogar</button>
            </div>
        </div>

        <div class="game-card">
            <img src="img/image copy 5.png">
            <div class="info">
                <h3>Adventure Land</h3>
                <p>Mundo aberto</p>
                <button>Jogar</button>
            </div>
        </div>

    </div>

</section>

<footer>
    <p>© 2026 Game Hub</p>
</footer>

</body>
</html>
